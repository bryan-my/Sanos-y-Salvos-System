# Nombre del microservicio
spring.application.name=ms-usuarios
server.port=8081

# Configuración de la Base de Datos (Docker)
spring.datasource.url=jdbc:postgresql://localhost:5433/db_usuarios
spring.datasource.username=user_sanos
spring.datasource.password=password123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
mascotas.service.url=http://localhost:8082
